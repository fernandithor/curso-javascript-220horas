<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

        let num_trabajador=0;

        let salarios=[];
        
        for(let i=0; i<5; i++){

            num_trabajador+=1;

            let salario=prompt("Introduce salario del trabajador" + num_trabajador);

            if(salario<1000) continue;

            salarios[i]=salario-(salario*0,25);
        }


        for(salario of salarios){

            if(!salario) continue;

            document.write(salario + "</br>");
        }



    </script>


</body>
</html>
