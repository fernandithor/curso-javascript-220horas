<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>    

        let nota=prompt("Introduce la nota del examen");

        if(nota<5) document.write("insuficiente")

        else if(nota<6) document.write("suficiente<br>")

        else if(nota<7) document.write("bien<br>")

        else if(nota<9) document.write("notable<br>")

        else document.write("Tu calificacion sobresaliente")

    </script>

</body>
</html>
