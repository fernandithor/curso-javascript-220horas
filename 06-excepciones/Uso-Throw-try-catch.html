<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        function factorial(x){

            try{
                
                if(x<0) throw new Error("Número negativo!")
            }
            catch(e){

                document.write(e);
            }
            

            let factorial;

            for(factorial=1;x>1;x--){

                factorial*=x;
            }


            return factorial;

        }

        let numero=parseInt(prompt("Introduce un nº"))

        document.write(factorial(numero));


    </script>




</body>
</html>
